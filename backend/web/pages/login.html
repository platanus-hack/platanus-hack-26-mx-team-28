<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar a dominikito</title>
  <link rel="icon" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <img class="login-logo" src="/assets/logo.png" alt="dominikito" onerror="this.remove()">
    <section class="card login-card">
      <h1>Entrar con Google</h1>
      <p class="hint">
        Inicia sesión de forma segura usando tu cuenta de Google para crear y guardar tus cuentos.
      </p>
      <div class="actions">
        <button class="btn-google" id="google-login-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
          Entrar con Google
        </button>
        <a class="btn ghost" href="/">Volver</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      projectId: "dominikito-c21fd",
      appId: "1:920971971262:web:c16dfe833965d5f6856cef",
      storageBucket: "dominikito-c21fd.firebasestorage.app",
      apiKey: "AIzaSyDNSJXT7zQJIBF1LccK-PB7Nru6ZreEnlE",
      authDomain: "dominikito-c21fd.firebaseapp.com",
      messagingSenderId: "920971971262",
      measurementId: "G-84N6ECME66"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const params = new URLSearchParams(window.location.search);
    const next = params.get("next") || "/app";

    // Redirect if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = next;
      }
    });

    document.getElementById("google-login-btn")?.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = next;
      } catch (error) {
        console.error("Google Sign-In Error:", error);
        alert("Error al iniciar sesión con Google: " + error.message);
      }
    });
  </script>

</body>
</html>
